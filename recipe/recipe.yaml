schema_version: 1

context:
  name: sqlite-anyio
  version: "0.2.9"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/sqlite_anyio-${{ version }}.tar.gz
  sha256: 76e3fbfc0f20c9710b28a9c4a37c064312a1cc9fd5754a77285816523274d0ff

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - anyio >=4.14.0,<5.0.0
    - typing_extensions >=4.15.0

tests:
  - python:
      imports: sqlite_anyio
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Asynchronous client for SQLite using AnyIO
  license_file: LICENSE
  license: MIT
  homepage: https://github.com/davidbrochart/sqlite-anyio
  repository: https://github.com/davidbrochart/sqlite-anyio

extra:
  recipe-maintainers:
    - davidbrochart
